# ===============================================
# VaultCore Financial
# ===============================================

spring.application.name=VaultCore-Financial-Backend

server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ???????????????????????????????????????????????
# Database ? MySQL 8.0.45
# ???????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/vaultcore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=vaultcore_user
spring.datasource.password=VaultCore@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ???????????????????????????????????????????????
# Hikari Connection Pool
# ???????????????????????????????????????????????
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=VaultCoreHikariCP

# ???????????????????????????????????????????????
# JPA / Hibernate
# ???????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ???????????????????????????????????????????????
# JWT
# ???????????????????????????????????????????????
jwt.secret=mySecretKeyForJWTGeneration2024VaultCoreFinancialWithExtraSecurityMeasures
jwt.expiration=86400000
jwt.refresh.expiration=604800000
jwt.issuer=VaultCoreFinancial
jwt.audience=VaultCoreApp

# ???????????????????????????????????????????????
# Fraud Detection & 2FA
# ???????????????????????????????????????????????
# Transfers above this amount trigger 2FA (OTP challenge)
fraud.threshold=10000

# OTP expiry in minutes
fraud.otp.expiry.minutes=5

# true = mock SMS/email logged to console; false = real provider (Twilio/SendGrid)
fraud.two-factor-enabled=true
fraud.sms-mock-enabled=true

# ???????????????????????????????????????????????
# Virtual Threads (Java 21) ? enables virtual threads for all Tomcat threads
# This + TransferService.getBalance() virtual executor = full virtual thread stack
# ???????????????????????????????????????????????
spring.threads.virtual.enabled=true

# ???????????????????????????????????????????????
# Async (for AuditAspect @Async logging)
# ???????????????????????????????????????????????
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ???????????????????????????????????????????????
# Logging
# ???????????????????????????????????????????????
logging.level.com.vaultcore=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/vaultcore.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ???????????????????????????????????????????????
# Jackson
# ???????????????????????????????????????????????
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ???????????????????????????????????????????????
# CORS (actual config in SecurityConfig.java)
# ???????????????????????????????????????????????
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600
